apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-nightly-backup
spec:
  # 2 AM daily. CNPG schedule format: second minute hour dom month dow
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: placeholder
