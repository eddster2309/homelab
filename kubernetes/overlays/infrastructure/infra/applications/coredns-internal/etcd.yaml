apiVersion: v1
kind: Service
metadata:
  name: etcd
spec:
  ports:
    - port: 2379
      name: client
      targetPort: 2379
  selector:
    app: etcd
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
spec:
  clusterIP: None
  ports:
    - port: 2380
      name: peer
      targetPort: 2380
  selector:
    app: etcd
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
spec:
  serviceName: etcd-headless
  replicas: 3
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: registry.k8s.io/etcd:3.5.21-0
          command:
            - /bin/sh
            - -ec
            - |
              exec etcd \
                --name=${HOSTNAME} \
                --data-dir=/var/lib/etcd \
                --listen-client-urls=http://REDACTED_IP:2379 \
                --listen-peer-urls=http://REDACTED_IP:2380 \
                --advertise-client-urls=http://${HOSTNAME}.etcd-headless.coredns-internal.svc.cluster.local:2379 \
                --initial-advertise-peer-urls=http://${HOSTNAME}.etcd-headless.coredns-internal.svc.cluster.local:2380 \
                --initial-cluster=etcd-0=http://etcd-0.etcd-headless.coredns-internal.svc.cluster.local:2380,etcd-1=http://etcd-1.etcd-headless.coredns-internal.svc.cluster.local:2380,etcd-2=http://etcd-2.etcd-headless.coredns-internal.svc.cluster.local:2380 \
                --initial-cluster-state=new \
                --initial-cluster-token=coredns-etcd
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ETCDCTL_API
              value: "3"
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - etcdctl --endpoints http://REDACTED_IP:2379 endpoint health
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - etcdctl --endpoints http://REDACTED_IP:2379 endpoint health
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
