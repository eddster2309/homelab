apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-wal-heartbeat
  namespace: cloudnative-pg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-wal-heartbeat
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-wal-heartbeat
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-wal-heartbeat
subjects:
- kind: ServiceAccount
  name: cnpg-wal-heartbeat
  namespace: cloudnative-pg
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-wal-heartbeat
  namespace: cloudnative-pg
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cnpg-wal-heartbeat
          restartPolicy: OnFailure
          containers:
          - name: heartbeat
            image: docker.io/alpine/k8s:1.32.3
            command:
            - /bin/sh
            - -c
            - |
              kubectl get pods -A -l cnpg.io/instanceRole=primary \
                -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' \
              | while IFS='/' read -r ns primary; do
                offset=$(kubectl exec -n "$ns" "$primary" -c postgres -- \
                  psql -U postgres -tAc \
                  "SELECT (pg_walfile_name_offset(pg_current_wal_lsn())).file_offset;" \
                  2>/dev/null)
                if [ "$offset" = "0" ]; then
                  kubectl exec -n "$ns" "$primary" -c postgres -- \
                    psql -U postgres -tAc \
                    "SELECT pg_logical_emit_message(false, 'heartbeat', 'cnpg-wal-heartbeat');" \
                    2>/dev/null
                  echo "Heartbeat emitted: $ns/$primary (WAL was at segment boundary)"
                else
                  echo "OK: $ns/$primary (offset=$offset)"
                fi
              done
