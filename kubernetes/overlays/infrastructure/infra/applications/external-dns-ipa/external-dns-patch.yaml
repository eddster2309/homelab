apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  chart:
    spec:
      version: "1.20.0"
  values:
    policy: sync
    env:
      - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
        valueFrom:
          secretKeyRef:
            name: ipa-tsig-secret
            key: rfc2136_tsig_secret
    provider: 
      name: rfc2136
      rfc2136:
        host: "ipa01.internal"
        tsigKeyname: acme-update
        tsigSecretAlg: hmac-sha512
        zones:
          - "example.com"
    serviceMonitor:
      enabled: true