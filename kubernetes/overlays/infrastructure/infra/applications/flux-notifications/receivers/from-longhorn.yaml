---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: from-longhorn
  namespace: flux-system
spec:
  type: generic
  secretRef:
    name: receiver-token-from-longhorn
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: cloudnative-pg
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: longhorn-config
      namespace: flux-system
