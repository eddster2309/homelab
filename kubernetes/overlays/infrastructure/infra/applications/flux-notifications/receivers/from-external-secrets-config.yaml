---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: from-external-secrets-config
  namespace: flux-system
spec:
  type: generic
  secretRef:
    name: receiver-token-from-external-secrets-config
  resources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: cert-manager
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: longhorn
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: dragonfly-operator
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: external-dns-ipa
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: authelia
      namespace: flux-system
