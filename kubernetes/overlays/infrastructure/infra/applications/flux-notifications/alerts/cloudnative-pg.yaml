---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: cloudnative-pg-ready
  namespace: flux-system
spec:
  providerRef:
    name: notify-from-cloudnative-pg
  eventSeverity: info
  eventSources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: cloudnative-pg
  inclusionList:
    - "ReconciliationSucceeded"
