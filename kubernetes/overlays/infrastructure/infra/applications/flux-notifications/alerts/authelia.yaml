---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: authelia-ready
  namespace: flux-system
spec:
  providerRef:
    name: notify-from-authelia
  eventSeverity: info
  eventSources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: authelia
  inclusionList:
    - "ReconciliationSucceeded"
