---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: traefik-ready
  namespace: flux-system
spec:
  providerRef:
    name: notify-from-traefik
  eventSeverity: info
  eventSources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: traefik
  inclusionList:
    - "ReconciliationSucceeded"
