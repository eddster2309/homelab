---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: external-secrets-config-ready
  namespace: flux-system
spec:
  providerRef:
    name: notify-from-external-secrets-config
  eventSeverity: info
  eventSources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: external-secrets-config
  inclusionList:
    - "ReconciliationSucceeded"
