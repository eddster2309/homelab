---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: dragonfly-operator-ready
  namespace: flux-system
spec:
  providerRef:
    name: notify-from-dragonfly-operator
  eventSeverity: info
  eventSources:
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: dragonfly-operator
  inclusionList:
    - "ReconciliationSucceeded"
