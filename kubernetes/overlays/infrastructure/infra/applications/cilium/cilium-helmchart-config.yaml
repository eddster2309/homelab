apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-cilium
  namespace: kube-system
spec:
  valuesContent: |
    kubeProxyReplacement: true
    k8sServiceHost: REDACTED_IP
    k8sServicePort: 6443
    tunnelProtocol: geneve # New
    bpf: # New
      masquerade: true # New
    loadBalancer:                     # New
      mode: dsr                       # New
      dsrDispatch: geneve             # New
    l2announcements:
      enabled: true
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    cni:
      exclusive: false
    hostFirewall:
      enabled: false
    monitor:
      enabled: false
    prometheus:
      metricsService: true
      enabled: true
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
    hubble: 
      enabled: true
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
      relay: 
        enabled: true
      ui:
        enabled: true
        ingress:
          enabled: true
          className: "traefik"
          annotations:
            traefik.ingress.kubernetes.io/router.middlewares: traefik-authelia@kubernetescrd
          hosts:
            - cilium.example.com

