apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    defaultSettings:
      guaranteedInstanceManagerCpu: 6
    defaultBackupStore:
      backupTarget: s3://rke-longhorn-backup@us-east-1/
      backupTargetCredentialSecret: s3-secret
    ingress:
      enabled: true
      host: longhorn.example.com
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: traefik-authelia@kubernetescrd
    metrics:
      serviceMonitor:
        enabled: true