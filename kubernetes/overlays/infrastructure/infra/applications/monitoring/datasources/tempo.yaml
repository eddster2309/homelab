apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-configmap-tempo
  labels:
     grafana_datasource: "1"
data:
  tempo.yaml: |-
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.tempo.svc.cluster.local:3200
        isDefault: false
