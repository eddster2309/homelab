apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: omada-exporter-credentials
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: omada-exporter-credentials
    creationPolicy: 'Owner'
  data:
    - secretKey: username
      remoteRef:
        key: omada-exporter/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: omada-exporter/credentials
        property: password
    - secretKey: client_id
      remoteRef:
        key: omada-exporter/credentials
        property: id
    - secretKey: secret_id
      remoteRef:
        key: omada-exporter/credentials
        property: secret
