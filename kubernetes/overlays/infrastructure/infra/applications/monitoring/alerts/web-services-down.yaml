apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: web-services-down
spec:
  groups:
    - name: web-services-down
      rules:
        - alert: WebServiceDown
          expr: probe_success{job="blackbox-http"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.instance }} is not returning a successful response"
            description: "Blackbox probe of {{ $labels.instance }} has failed for 2 minutes (no 2xx response)."
