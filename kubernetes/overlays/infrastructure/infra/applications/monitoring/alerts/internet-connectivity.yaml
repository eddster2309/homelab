apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: internet-connectivity
spec:
  groups:
    - name: internet-connectivity
      rules:
        - alert: InternetDown
          expr: |
            (probe_success{job="blackbox-icmp", instance="REDACTED_IP"} == 0)
            and on()
            (probe_success{job="blackbox-icmp", instance="REDACTED_IP"} == 0)
            and on()
            (probe_success{job="blackbox-icmp", instance="REDACTED_IP"} == 1)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Internet connectivity lost"
            description: "Cloudflare (REDACTED_IP) and Google (REDACTED_IP) are unreachable but the router (REDACTED_IP) is up, indicating the WAN link is down."
