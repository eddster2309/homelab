apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  chart:
    spec:
      version: "4.1.3"
  values:
    cluster:
      name: rke-alloy
    destinations:
      localLoki:
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push
      tempo:
        type: otlp
        url: http://tempo.tempo.svc.cluster.local:4317
        tls:
          insecure: true
        metrics:
          enabled: false
        logs:
          enabled: false
        traces:
          enabled: true
    applicationObservability:
      enabled: true
      collector: receiver-collector
      destinations:
        - tempo
      metrics:
        enabled: false
      logs:
        enabled: false
      receivers:
        otlp:
          grpc:
            enabled: true
          http:
            enabled: true
    clusterEvents:
      enabled: true
      collector: logs-collector
    nodeLogs:
      enabled: true
      collector: logs-collector
    podLogsViaLoki:
      enabled: true
      collector: logs-collector
    selfReporting:
      enabled: true
      collector: logs-collector
    collectors:
      receiver-collector:
        alloy:
          extraPorts:
            # otlp-grpc/otlp-http are required by applicationObservability's
            # receivers above; must be listed explicitly since setting
            # extraPorts here replaces rather than merges with its auto-added
            # ports.
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
            - name: faro
              port: 12347
              targetPort: 12347
              protocol: TCP
        extraConfig: |
          // Faro Web SDK receiver: browser RUM (errors, logs, traces) POSTed to
          // https://faro.example.com/collect. Exposed with no Authelia
          // middleware on its ingress since browsers POST anonymously.
          loki.write "faro_logs" {
            endpoint {
              url = "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push"
            }
          }

          faro.receiver "default" {
            server {
              listen_address       = "REDACTED_IP"
              listen_port          = 12347
              cors_allowed_origins = ["*"]
            }

            // Labels attached to every Faro log line in Loki. Static value ("faro")
            // sets the label directly; empty value promotes that field out of the
            // event payload. session_id/user_id are intentionally left out of labels
            // (high cardinality) - they stay queryable in the log line itself.
            extra_log_labels = {
              job             = "faro",
              kind            = "",
              app_name        = "",
              app_environment = "",
              level           = "",
            }

            output {
              logs   = [loki.write.faro_logs.receiver]
              traces = [otelcol.processor.attributes.tempo.input]
            }
          }
      logs-collector:
        presets: [filesystem-log-reader, daemonset]
        alloy:
          extraPorts:
            - name: syslog
              port: 51515
              targetPort: 51515
              protocol: UDP
        extraConfig: |
          loki.relabel "syslog_extract_labels" {
            rule {
              source_labels = ["__syslog_message_hostname"]
              target_label  = "host"
            }
            rule {
              source_labels = ["__syslog_message_sd_rsyslog_src_ip"]
              target_label  = "src_ip"
            }
            rule {
              source_labels = ["__syslog_message_app_name"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__syslog_message_severity"]
              target_label  = "severity"
            }
            rule {
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
            }
            forward_to = [loki.write.localloki.receiver]
          }

          loki.source.syslog "syslog_in" {
            listener {
              address               = "REDACTED_IP:51515"
              protocol              = "udp"
              syslog_format         = "rfc5424"
              label_structured_data = true
              labels                = { job = "syslog" }
            }
            relabel_rules = loki.relabel.syslog_extract_labels.rules
            forward_to = [loki.write.localloki.receiver]
          }