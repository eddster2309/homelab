namespace: monitoring
resources:
- ./secrets
- ../../../../../bases/monitoring
- ./dashboards
- ./datasources
- ./scrape_configs
- ./alerts
- ./alertmanager
- ./rsyslog-configmap.yaml
- ./rsyslog-deployment.yaml
- ./rsyslog-service.yaml
- ./exporters
- ./faro-ingress.yaml
patches:
  - target:
      kind: HelmRelease
      name: vicmetrics
    path: ./vic-metrics-patch.yaml
  - target:
      kind: HelmRelease
      name: loki
    path: ./loki-patch.yaml
  - target:
      kind: HelmRelease
      name: k8s-monitoring
    path: ./k8s-monitoring-patch.yaml
  - target:
      kind: HelmRelease
      name: blackbox-exporter
    path: ./exporters/blackbox/blackbox-exporter-patch.yaml

