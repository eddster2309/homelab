apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: example.com-tls
  namespace: traefik
spec:
  secretName: example.com-tls
  dnsNames:
    - example.com
    - '*.example.com'
    - '*.example.com'
    - 0b.au
    - "*.coder.0b.au"
    - "*.0b.au"
  issuerRef:
    name: letsencrypt-issuer
    kind: ClusterIssuer
