---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-service-frigate
  labels:
    kubernetes.io/service-name: external-service-frigate
addressType: IPv4
ports:
  - port: 5000
    name: http
    protocol: TCP
  - port: 8554
    name: rtsp
    protocol: TCP
endpoints:
  - addresses:
    - "REDACTED_IP"
    conditions:
      ready: true
---
apiVersion: v1
kind: Service
metadata:
  name: external-service-frigate
spec:
  ports:
    - port: 5000
      protocol: TCP
      targetPort: 5000
      name: http
    - port: 8554
      protocol: TCP
      targetPort: 8554
      name: rtsp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: external-service-frigate
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: traefik-authelia@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: cctv.example.com
      http:
        paths:
        - backend:
            service:
              name: external-service-frigate
              port:
                number: 5000
          path: /
          pathType: ImplementationSpecific
