apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coredns-internal
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./kubernetes/overlays/infrastructure/infra/applications/coredns-internal
  prune: true
  dependsOn:
    - name: repositories-infra
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: coredns
      namespace: coredns-internal
    - apiVersion: apps/v1
      kind: StatefulSet
      name: etcd
      namespace: coredns-internal
