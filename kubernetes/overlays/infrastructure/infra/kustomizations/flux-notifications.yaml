---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-notifications
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./kubernetes/overlays/infrastructure/infra/applications/flux-notifications
  prune: true
  sourceRef:
    kind: "GitRepository"
    name: "flux-system"
  dependsOn:
    - name: repositories-infra
