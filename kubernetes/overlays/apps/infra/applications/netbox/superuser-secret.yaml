---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-config-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: netbox-config-secret
    creationPolicy: 'Owner'
    template:
      engineVersion: v2
      data:
        secret_key: '{{ .secret_key }}'
        email_password: ''
  dataFrom:
  - extract:
      key: netbox/config
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: netbox-superuser
    creationPolicy: 'Owner'
    template:
      engineVersion: v2
      data:
        username: admin
        email: admin@example.com
        password: '{{ .password }}'
        api_token: '{{ .api_token }}'
  dataFrom:
  - extract:
      key: netbox/superuser
