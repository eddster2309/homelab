apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
spec:
  timeout: 10m
  chart:
    spec:
      version: "8.0.23"
  values:
    superuser:
      existingSecret: netbox-superuser

    existingSecret: netbox-config-secret

    allowedHosts:
      - netbox.example.com

    csrf:
      trustedOrigins:
        - https://netbox.example.com

    loginRequired: true

    email:
      server: mail.smtpgo.com
      useTLS: true
      port: 465
      username:
      from: "Eddster Netbox <netbox-noreply@example.com>"
      existingSecretName: netbox-smtp

    preferIPv4: true

    timeZone: Australia/Sydney

    postgresql:
      enabled: false

    externalDatabase:
      host: netbox-db-rw.netbox.svc.cluster.local
      port: 5432
      database: app
      username: app
      existingSecretName: netbox-db-app
      existingSecretKey: password

    # Disable bundled Valkey — using Dragonfly
    valkey:
      enabled: false

    tasksDatabase:
      host: netbox-dragonfly.netbox.svc.cluster.local
      port: 6379
      database: 0

    cachingDatabase:
      host: netbox-dragonfly.netbox.svc.cluster.local
      port: 6379
      database: 1

    remoteAuth:
      enabled: true
      backends:
        - social_core.backends.open_id_connect.OpenIdConnectAuth
      autoCreateUser: true
      autoCreateGroups: true
      groupSyncEnabled: false

    extraConfig:
      - secret:
          secretName: netbox-api-token-peppers
      - secret:
          secretName: netbox-oidc-config
      - values:
          SOCIAL_AUTH_PIPELINE:
            - social_core.pipeline.social_auth.social_details
            - social_core.pipeline.social_auth.social_uid
            - social_core.pipeline.social_auth.social_user
            - social_core.pipeline.user.get_username
            - social_core.pipeline.social_auth.associate_by_email
            - social_core.pipeline.user.create_user
            - social_core.pipeline.social_auth.associate_user
            - netbox.authentication.user_default_groups_handler
            - social_core.pipeline.social_auth.load_extra_data
            - social_core.pipeline.user.user_details
            - netbox.sso_pipeline_roles.set_role
          SOCIAL_AUTH_STAFF_ROLE: k8s-netbox-staff
          SOCIAL_AUTH_SUPERUSER_ROLE: k8s-netbox-admins

    initContainers:
      - name: register-scripts
        image: ghcr.io/netbox-community/netbox:v4.5.4
        command:
          - /bin/sh
          - -c
          - /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /opt/netbox/netbox/scripts/register_scripts.py
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: config
            mountPath: /etc/netbox/config/configuration.py
            subPath: configuration.py
            readOnly: true
          - name: config
            mountPath: /run/config/netbox
            readOnly: true
          - name: secrets
            mountPath: /run/secrets/netbox
            readOnly: true
          - name: netbox-register-scripts
            mountPath: /opt/netbox/netbox/scripts/register_scripts.py
            subPath: register_scripts.py
            readOnly: true
          - name: opnsense-sync-script
            mountPath: /opt/netbox/netbox/scripts/opnsense_sync.py
            subPath: opnsense_sync.py
            readOnly: true
          - name: proxmox-sync-script
            mountPath: /opt/netbox/netbox/scripts/proxmox_sync.py
            subPath: proxmox_sync.py
            readOnly: true

    extraVolumes:
      - name: sso-pipeline-roles
        configMap:
          name: sso-pipeline-roles
      - name: opnsense-sync-script
        configMap:
          name: opnsense-sync-script
      - name: proxmox-sync-script
        configMap:
          name: proxmox-sync-script
      - name: netbox-register-scripts
        configMap:
          name: netbox-register-scripts

    extraVolumeMounts:
      - name: sso-pipeline-roles
        mountPath: /opt/netbox/netbox/netbox/sso_pipeline_roles.py
        subPath: sso_pipeline_roles.py
        readOnly: true
      - name: opnsense-sync-script
        mountPath: /opt/netbox/netbox/scripts/opnsense_sync.py
        subPath: opnsense_sync.py
        readOnly: true
      - name: proxmox-sync-script
        mountPath: /opt/netbox/netbox/scripts/proxmox_sync.py
        subPath: proxmox_sync.py
        readOnly: true
    worker:
      extraVolumes:
        - name: opnsense-sync-script
          configMap:
            name: opnsense-sync-script
        - name: proxmox-sync-script
          configMap:
            name: proxmox-sync-script
      extraVolumeMounts:
        - name: opnsense-sync-script
          mountPath: /opt/netbox/netbox/scripts/opnsense_sync.py
          subPath: opnsense_sync.py
          readOnly: true
        - name: proxmox-sync-script
          mountPath: /opt/netbox/netbox/scripts/proxmox_sync.py
          subPath: proxmox_sync.py
          readOnly: true
      podAnnotations:
        reloader.stakater.com/auto: "true"

    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: netbox.example.com
          paths:
            - /

    persistence:
      enabled: true
      storageClass: longhorn
      accessMode: ReadWriteMany
      size: 5Gi

    podAnnotations:
      reloader.stakater.com/auto: "true"
