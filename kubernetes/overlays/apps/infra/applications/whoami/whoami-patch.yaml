apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whoami
spec:
  chart:
    spec:
      version: "6.0.0"
  values:
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 64Mi
    ingress:
      enabled: true
      ingressClassName: "traefik"
      hosts:
        - host: whoami.example.com
          paths:
            - /