apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: binarylane-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: binarylane-secret
    creationPolicy: 'Owner'
  data:
  - secretKey: api_token
    remoteRef:
      key: binarylane/credentials
      property: api_token
