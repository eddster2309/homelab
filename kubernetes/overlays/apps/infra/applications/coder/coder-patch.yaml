apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
  namespace: coder
spec:
  chart:
    spec:
      version: "2.34.0"
  values:
    coder:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      env:
        - name: CODER_ACCESS_URL
          value: "https://coder.0b.au"
        - name: CODER_WILDCARD_ACCESS_URL
          value: "*.coder.0b.au"
        - name: CODER_SESSION_TOKEN_COOKIE_DOMAIN
          value: ".0b.au"
        - name: CODER_PG_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: coder-db-app
              key: uri
        - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
          value: "false"
        - name: CODER_TELEMETRY_ENABLE
          value: "false"
        - name: CODER_OIDC_ISSUER_URL
          value: "https://auth.0b.au"
        - name: CODER_OIDC_IGNORE_EMAIL_VERIFIED
          value: "true"
        - name: CODER_OIDC_CLIENT_ID
          value: "coder"
        - name: CODER_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oidc-secret
              key: OAUTH_CLIENT_SECRET
        - name: CODER_OIDC_SIGN_IN_TEXT
          value: "Sign in with Eddster Auth"
        - name: CODER_DISABLE_PASSWORD_AUTH
          value: "true"
        - name: CODER_EXTERNAL_AUTH_0_ID
          value: eddster-gitlab
        - name: CODER_EXTERNAL_AUTH_0_TYPE
          value: gitlab
        - name: CODER_EXTERNAL_AUTH_0_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: gitlab-secret
              key: id
        - name: CODER_EXTERNAL_AUTH_0_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: gitlab-secret
              key: secret
        - name: CODER_EXTERNAL_AUTH_0_DISPLAY_NAME
          value: "Eddster GitLab"
        - name: CODER_EXTERNAL_AUTH_0_DISPLAY_ICON
          value: "https://cdn.jsdelivr.net/gh/selfhst/icons@master/svg/gitlab.svg"
        - name: CODER_EXTERNAL_AUTH_0_VALIDATE_URL
          value: https://gitlab.example.com/oauth/token/info
        - name: CODER_EXTERNAL_AUTH_0_AUTH_URL
          value: https://gitlab.example.com/oauth/authorize
        - name: CODER_EXTERNAL_AUTH_0_TOKEN_URL
          value: https://gitlab.example.com/oauth/token
        - name: CODER_EXTERNAL_AUTH_0_REVOKE_URL
          value: https://gitlab.example.com/oauth/revoke
        - name: CODER_EXTERNAL_AUTH_0_REGEX
          value: "gitlab\\.k8s\\.eddster\\.com"
        - name: BINARYLANE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: binarylane-secret
              key: api_token
        - name: TF_VAR_CLAUDE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: claude-secret
              key: token
        - name: TF_VAR_proxmox_token_id
          valueFrom:
            secretKeyRef:
              name: proxmox-secret
              key: id
        - name: TF_VAR_proxmox_token
          valueFrom:
            secretKeyRef:
              name: proxmox-secret
              key: token
      serviceAccount:
        extraRules:
        - apiGroups: [""]
          resources: ["configmaps", "secrets", "persistentvolumeclaims", "pods", "pods/exec", "pods/log", "serviceaccounts", "services"]
          verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
        - apiGroups: ["apps"]
          resources: ["deployments"]
          verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["ingresses"]
          verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
      ingress:
        enable: true
        className: traefik
        host: coder.0b.au
        wildcardHost: "*.coder.0b.au"