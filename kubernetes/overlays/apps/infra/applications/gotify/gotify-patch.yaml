apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotify
spec:
  values:
    controllers:
      gotify:
        containers:
          app:
            image:
              repository: gotify/server
              tag: latest
            envFrom:
              - secretRef:
                  name: gotify-credentials
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
        pod:
          annotations:
            reloader.stakater.com/auto: "true"

    service:
      app:
        controller: gotify
        ports:
          http:
            port: 80

    ingress:
      app:
        enabled: true
        className: traefik
        hosts:
          - host: gotify.example.com
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      data:
        enabled: true
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data
