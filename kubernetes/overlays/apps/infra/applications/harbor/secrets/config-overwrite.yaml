apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-config-overwrite
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-config-overwrite
    creationPolicy: 'Owner'
    template:
      engineVersion: v2
      data:
        CONFIG_OVERWRITE_JSON: '{"auth_mode":"oidc_auth","primary_auth_mode":true,"oidc_name":"Authelia","oidc_endpoint":"https://auth.example.com","oidc_client_id":"harbor","oidc_client_secret":"{{ .key }}","oidc_scope":"openid,profile,email,groups","oidc_groups_claim":"groups","oidc_admin_group":"k8s-harbor-admins","oidc_auto_onboard":true,"oidc_user_claim":"preferred_username","oidc_verify_cert":true}'
  dataFrom:
  - extract:
      key: authelia/clients/harbor
