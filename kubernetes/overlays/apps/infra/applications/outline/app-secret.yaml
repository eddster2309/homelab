apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-secret
    creationPolicy: 'Owner'
  data:
  - secretKey: SECRET_KEY
    remoteRef:
      key: outline/credentials
      property: secret_key
  - secretKey: UTILS_SECRET
    remoteRef:
      key: outline/credentials
      property: utils_secret
