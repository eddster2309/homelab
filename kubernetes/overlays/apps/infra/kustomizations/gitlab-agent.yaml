apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gitlab-agent
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./kubernetes/overlays/apps/infra/applications/gitlab-agent
  healthChecks:
    - kind: HelmRelease
      name: gitlab-agent
      namespace: gitlab-agent
      apiVersion: helm.toolkit.fluxcd.io/v2beta1
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
