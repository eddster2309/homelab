apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coder-workspaces
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./kubernetes/overlays/apps/infra/applications/coder-workspaces
  prune: true
  dependsOn:
    - name: coder
  sourceRef:
    kind: GitRepository
    name: flux-system
