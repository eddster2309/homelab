apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: couchdb
spec:
  interval: 30m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: couchdb
      version: "4.*"
      sourceRef:
        kind: HelmRepository
        name: couchdb
        namespace: flux-system
      interval: 12h
