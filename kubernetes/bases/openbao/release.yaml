apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
spec:
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
      interval: 12h
